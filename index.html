<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sporting CP · Mercado Verão 2026</title>
  <script>(function(){const t=localStorage.getItem("theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");})()</script>
  <style>
    :root {
      --green: #07A04A;
      --green-dark: #056635;
      --green-light: #e8f7ef;
      --white: #ffffff;
      --bg: #f2f4f7;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;

      --status-oficial: #07A04A;
      --status-oficial-bg: #e8f7ef;
      --status-fechado: #2563eb;
      --status-fechado-bg: #eff6ff;
      --status-negociacao: #d97706;
      --status-negociacao-bg: #fffbeb;
      --status-analise: #6b7280;
      --status-analise-bg: #f3f4f6;
      --status-saida-oficial: #dc2626;
      --status-saida-oficial-bg: #fef2f2;
      --status-saida-fechada: #7c3aed;
      --status-saida-fechada-bg: #f5f3ff;
      --status-risco: #ea580c;
      --status-risco-bg: #fff7ed;
    }

    [data-theme="dark"] {
      --bg: #111318;
      --card: #1c1f2a;
      --text: #e2e4ed;
      --muted: #8b909e;
      --border: #2e3347;
      --green-light: #0a2218;

      --status-oficial-bg:      #0a2218;
      --status-fechado-bg:      #0a1628;
      --status-negociacao-bg:   #271f08;
      --status-analise-bg:      #1c1e24;
      --status-saida-oficial-bg:#270a0a;
      --status-saida-fechada-bg:#16082a;
      --status-risco-bg:        #271508;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .02em;
    }
    .header-badge { width: 34px; height: 34px; object-fit: contain; }
    .header-right {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .header-dates {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }
    .header-date { font-size: .78rem; opacity: .85; }
    .header-updated { font-size: .68rem; opacity: .65; }
    /* .header-countdown removed — countdown moved to sidebar card */
    .theme-toggle {
      background: rgba(255,255,255,.15);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 9px;
      line-height: 1;
      transition: background .15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: rgba(255,255,255,.28); }

    /* ── LAYOUT ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── LIST VIEW ── */
    #list-layout {
      display: flex;
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      align-items: flex-start;
    }
    #players-column { flex: 1; min-width: 0; }
    #balance-side {
      width: 172px;
      flex-shrink: 0;
      position: sticky;
      top: 76px;
    }

    /* ── BALANCE CARD (sidebar) ── */
    .balance-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px;
      cursor: pointer;
      text-align: center;
      transition: box-shadow .15s;
      margin-top: 10px;
    }
    .balance-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); }
    .balance-card-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .balance-card-value { font-size: 1.35rem; font-weight: 800; line-height: 1.1; }
    .balance-card-value.positive { color: var(--green); }
    .balance-card-value.negative { color: #dc2626; }
    .balance-card-sub { font-size: .7rem; color: var(--muted); margin-top: 8px; line-height: 1.55; }
    .balance-card-hint {
      font-size: .7rem;
      color: var(--green-dark);
      font-weight: 600;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    @media (max-width: 599px) {
      #list-layout { flex-direction: column-reverse; gap: 0; padding-bottom: 48px; }
      #balance-side { width: 100%; position: static; padding-bottom: 12px; }
      .balance-card { display: flex; align-items: center; gap: 14px; text-align: left; padding: 12px 14px; }
      .balance-card-label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
      .balance-card-value { font-size: 1.15rem; }
      .balance-card-sub { margin-top: 0; }
      .balance-card-hint { display: none; }
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .section-title:first-child { margin-top: 0; }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
      text-decoration: none;
      color: inherit;
    }
    .player-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }
    .player-card-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .player-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .player-info { min-width: 0; }
    .player-name {
      font-weight: 600;
      font-size: .95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .player-card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .chevron { color: var(--muted); font-size: .9rem; }

    /* ── STATUS BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .badge.oficial        { background: var(--status-oficial-bg);        color: var(--status-oficial); }
    .badge.fechado        { background: var(--status-fechado-bg);        color: var(--status-fechado); }
    .badge.negociacao     { background: var(--status-negociacao-bg);     color: var(--status-negociacao); }
    .badge.analise        { background: var(--status-analise-bg);        color: var(--status-analise); }
    .badge.saida-oficial  { background: var(--status-saida-oficial-bg);  color: var(--status-saida-oficial); }
    .badge.saida-fechada  { background: var(--status-saida-fechada-bg);  color: var(--status-saida-fechada); }
    .badge.risco          { background: var(--status-risco-bg);          color: var(--status-risco); }

    /* ── DETAIL VIEW ── */
    #detail-view { max-width: 720px; margin: 0 auto; padding-bottom: 48px; }

    .detail-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 16px;
      font-size: .85rem;
      color: var(--green);
      font-weight: 600;
      cursor: pointer;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .detail-back:hover { background: var(--green-light); }

    .detail-hero {
      background: var(--green);
      color: white;
      padding: 28px 20px 24px;
    }
    .detail-hero-inner { max-width: 680px; margin: 0 auto; }
    .detail-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 14px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.4);
    }
    .detail-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-name { font-size: 1.5rem; font-weight: 800; line-height: 1.2; }
    .detail-subtitle { opacity: .85; font-size: .9rem; margin-top: 4px; }
    .detail-badge-wrap { margin-top: 14px; }

    .detail-body { padding: 20px 16px; }
    .detail-section { margin-bottom: 20px; }
    .detail-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .detail-text { font-size: .9rem; line-height: 1.6; color: var(--text); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .detail-stat-value { font-size: 1.05rem; font-weight: 700; }
    .detail-stat-label { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    .sources-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .sources-list a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--green-dark);
      text-decoration: none;
      font-weight: 500;
    }
    .sources-list a:hover { text-decoration: underline; }

    .warning-box {
      background: var(--status-negociacao-bg);
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .82rem;
      color: #92400e;
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }

    /* ── BALANCE VIEW ── */
    #balance-view { max-width: 720px; margin: 0 auto; padding-bottom: 48px; }
    .balance-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .balance-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .balance-table tr:last-child td { border-bottom: none; }
    .balance-table .bt-name { font-weight: 600; }
    .balance-table .bt-club { color: var(--muted); font-size: .78rem; }
    .balance-table .bt-fee { text-align: right; font-weight: 700; white-space: nowrap; }
    .balance-table .bt-fee-max { color: var(--muted); font-weight: 400; font-size: .75rem; }
    .balance-total-row td { font-weight: 700; background: var(--bg); border-top: 2px solid var(--border); }
    .balance-net-box { margin: 20px 16px 0; padding: 16px; border-radius: 12px; text-align: center; }
    .balance-net-box.positive { background: var(--status-oficial-bg); color: var(--status-oficial); }
    .balance-net-box.negative { background: var(--status-saida-oficial-bg); color: var(--status-saida-oficial); }
    .balance-net-value { font-size: 1.8rem; font-weight: 800; }
    .balance-net-label { font-size: .8rem; margin-top: 4px; opacity: .85; }
    .balance-footnote { margin: 12px 16px 0; font-size: .75rem; color: var(--muted); text-align: center; }

    /* ── UPDATES CARD (sidebar) ── */
    .updates-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: box-shadow .15s;
      margin-top: 10px;
    }
    .updates-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); }
    .updates-card-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .updates-card-count { font-size: .9rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .updates-card-time { font-size: .7rem; color: var(--muted); margin-bottom: 8px; }
    .updates-player-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
    .updates-player-name { font-size: .78rem; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .updates-more { font-size: .72rem; color: var(--muted); margin-top: 3px; }
    .updates-card-hint {
      font-size: .7rem;
      color: var(--green-dark);
      font-weight: 600;
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    /* ── UPDATES VIEW ── */
    #updates-view { max-width: 720px; margin: 0 auto; padding-bottom: 48px; }
    .updates-view-header {
      padding: 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .updates-view-title { font-size: 1rem; font-weight: 700; }
    .updates-view-sub { font-size: .78rem; color: var(--muted); margin-top: 3px; }
    .dir-tag { font-size: .65rem; font-weight: 700; letter-spacing: .04em; white-space: nowrap; margin-bottom: 4px; }
    .dir-tag.entrada { color: var(--green); }
    .dir-tag.saida   { color: #dc2626; }

    /* ── STALENESS ── */
    .stale-tag { display: inline-block; font-size: .63rem; font-weight: 600; padding: 2px 6px; border-radius: 999px; margin-top: 3px; white-space: nowrap; }
    .stale-tag.stale-muted { background: var(--status-analise-bg); color: var(--muted); }
    .stale-tag.stale-warn  { background: var(--status-negociacao-bg); color: var(--status-negociacao); }

    /* ── COUNTDOWN CARD (sidebar) ── */
    .countdown-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px;
      text-align: center;
      margin-top: 10px;
    }
    .countdown-card-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .countdown-card-value { font-size: 1.35rem; font-weight: 800; line-height: 1.1; color: var(--text); }
    .countdown-card-value.urgent { color: #dc2626; }
    .countdown-card-sub { font-size: .7rem; color: var(--muted); margin-top: 8px; }

    @media (max-width: 599px) {
      .countdown-card {
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: left;
        padding: 12px 14px;
        margin-top: 0;
      }
      .countdown-card-label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
      .countdown-card-value { font-size: 1.1rem; }
      .countdown-card-sub { margin-top: 0; }
    }

    @media (max-width: 599px) {
      .updates-card {
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: left;
        padding: 12px 14px;
        margin-top: 0;
      }
      .updates-card-label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
      #updates-chip-content { flex: 1; }
      .updates-card-count { margin-bottom: 0; font-size: .85rem; }
      .updates-card-time { margin-bottom: 0; }
      .updates-player-row, .updates-more, .updates-card-hint { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <img src="https://tmssl.akamaized.net/images/wappen/head/336.png" alt="Sporting CP" class="header-badge" referrerpolicy="no-referrer" />
    <span>Sporting CP · Mercado 2026</span>
  </div>
  <div class="header-right">
    <div class="header-dates">
      <span class="header-date" id="header-date"></span>
      <span class="header-updated" id="header-updated"></span>
    </div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Alternar modo escuro">🌙</button>
  </div>
</header>

<!-- LIST VIEW -->
<div id="list-view" class="page active">
  <div id="list-layout">
    <div id="players-column"></div>
    <div id="balance-side">
      <div class="updates-card" onclick="showUpdates()">
        <div class="updates-card-label">📰 Hoje</div>
        <div id="updates-chip-content"></div>
        <div class="updates-card-hint">ver detalhe →</div>
      </div>
      <div class="balance-card" onclick="showBalance()">
        <div class="balance-card-label">💰 Saldo</div>
        <div class="balance-card-value" id="balance-chip"></div>
        <div class="balance-card-sub" id="balance-sub"></div>
        <div class="balance-card-hint">ver detalhe →</div>
      </div>
      <div class="countdown-card">
        <div class="countdown-card-label">⏳ Janela</div>
        <div class="countdown-card-value" id="countdown-value"></div>
        <div class="countdown-card-sub" id="countdown-sub"></div>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view" class="page">
  <div class="detail-back" onclick="showList()">← Voltar</div>
  <div id="detail-content"></div>
</div>

<!-- BALANCE VIEW -->
<div id="balance-view" class="page">
  <div class="detail-back" onclick="showList()">← Voltar</div>
  <div id="balance-content"></div>
</div>

<!-- UPDATES VIEW -->
<div id="updates-view" class="page">
  <div class="detail-back" onclick="showList()">← Voltar</div>
  <div id="updates-content"></div>
</div>

<script>

  {

// ── HELPERS ─────────────────────────────────────────────────────────────────
function badge(statusKey) {
  const s = STATUS[statusKey];
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

const RUMOR_STATUSES = new Set(["analise", "negociacao", "risco"]);

function daysAgo(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return Math.floor((today - new Date(dateStr)) / 86400000);
}

function staleTag(p) {
  if (!RUMOR_STATUSES.has(p.status) || !p.last_news) return "";
  const d = daysAgo(p.last_news);
  if (d < 8)  return "";
  if (d < 15) return `<span class="stale-tag stale-muted">há ${d}d</span>`;
  return `<span class="stale-tag stale-warn">há ${d}d</span>`;
}

function renderCountdown() {
  const close = new Date("2026-08-31");
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const days = Math.round((close - today) / 86400000);
  const valEl = document.getElementById("countdown-value");
  const subEl = document.getElementById("countdown-sub");
  if (!valEl) return;
  if (days < 0) {
    valEl.textContent = "—";
    valEl.className = "countdown-card-value";
    subEl.textContent = "Janela fechada";
    return;
  }
  if (days === 0) {
    valEl.textContent = "Hoje";
    valEl.className = "countdown-card-value urgent";
  } else {
    valEl.textContent = days + "d";
    valEl.className = "countdown-card-value" + (days <= 7 ? " urgent" : "");
  }
  subEl.textContent = "fecho: 31 ago 2026";
}

// ── BALANCE ──────────────────────────────────────────────────────────────────
function computeBalance() {
  const incoming = PLAYERS.filter(p => p.status === "oficial" && p.fee_value != null);
  const outgoing = PLAYERS.filter(p => p.status === "saida_oficial" && p.fee_value != null);
  const totalIn  = incoming.reduce((s, p) => s + p.fee_value, 0);
  const totalOut = outgoing.reduce((s, p) => s + p.fee_value, 0);
  return { incoming, outgoing, totalIn, totalOut, net: totalOut - totalIn };
}

function fmtM(v) {
  return (v % 1 === 0 ? v.toFixed(0) : v.toFixed(1)) + "M";
}

function renderBalanceChip() {
  const { totalIn, totalOut, net } = computeBalance();
  const chip = document.getElementById("balance-chip");
  const sub  = document.getElementById("balance-sub");
  const sign = net >= 0 ? "+" : "−";
  chip.textContent = sign + "€" + fmtM(Math.abs(net));
  chip.className = "balance-card-value " + (net >= 0 ? "positive" : "negative");
  sub.innerHTML = "Receitas: €" + fmtM(totalOut) + "<br>Gastos: €" + fmtM(totalIn);
}

function renderBalance() {
  const { incoming, outgoing, totalIn, totalOut, net } = computeBalance();
  const sign = net >= 0 ? "+" : "−";
  const cls  = net >= 0 ? "positive" : "negative";

  function tableRows(players, isOutgoing) {
    return players.map(p => {
      const club = isOutgoing ? p.toClub : p.fromClub;
      const feeStr = p.fee_value === 0
        ? (isOutgoing ? "Fim de contrato / Sem valor" : "Sem valor")
        : "€" + fmtM(p.fee_value);
      const maxExtra = (p.fee_max != null && p.fee_max > p.fee_value)
        ? ` <span class="bt-fee-max">(até €${fmtM(p.fee_max)})</span>` : "";
      return `<tr>
        <td><div class="bt-name">${p.name}</div><div class="bt-club">${club}</div></td>
        <td class="bt-fee">${feeStr}${maxExtra}</td>
      </tr>`;
    }).join("");
  }

  function totalRow(label, value) {
    return `<tr class="balance-total-row">
      <td>${label}</td>
      <td class="bt-fee">€${fmtM(value)}</td>
    </tr>`;
  }

  document.getElementById("balance-content").innerHTML = `
    <div class="balance-net-box ${cls}">
      <div class="balance-net-value">${sign}€${fmtM(Math.abs(net))}</div>
      <div class="balance-net-label">Saldo líquido de transferências oficiais</div>
    </div>
    <div style="padding:20px 16px 0">
      <div class="detail-label" style="margin-bottom:10px">🚨 Saídas Oficiais</div>
      <table class="balance-table">
        ${tableRows(outgoing, true)}
        ${totalRow("Total receitas", totalOut)}
      </table>
    </div>
    <div style="padding:20px 16px 0">
      <div class="detail-label" style="margin-bottom:10px">✅ Entradas Oficiais</div>
      <table class="balance-table">
        ${tableRows(incoming, false)}
        ${totalRow("Total gastos", totalIn)}
      </table>
    </div>
    <div class="balance-footnote">Apenas transferências oficialmente anunciadas pelo clube</div>`;
}

// ── UPDATES ──────────────────────────────────────────────────────────────────
function getTodayUpdates() {
  const today = LAST_UPDATED.split(" ")[0];
  const entry = UPDATES_LOG.find(e => e.date === today);
  if (!entry) return [];
  return entry.ids.map(id => PLAYERS.find(p => p.id === id)).filter(Boolean);
}

function renderUpdatesChip() {
  const players = getTodayUpdates();
  const chip = document.getElementById("updates-chip-content");
  const time = LAST_UPDATED.split(" ")[1];

  if (!players.length) {
    chip.innerHTML = `<div class="updates-card-count" style="color:var(--muted);font-weight:400;font-style:italic">Sem atualizações hoje</div>`;
    return;
  }

  const preview = players.slice(0, 3);
  const extra = players.length - 3;
  let rows = preview.map(p =>
    `<div class="updates-player-row">
      ${badge(p.status)}
      <span class="updates-player-name">${p.name}</span>
    </div>`
  ).join("");
  if (extra > 0) rows += `<div class="updates-more">+${extra} mais</div>`;

  chip.innerHTML =
    `<div class="updates-card-count">${players.length} jogador${players.length > 1 ? "es" : ""}</div>` +
    `<div class="updates-card-time">${time}</div>` +
    rows;
}

function renderUpdates() {
  const players = getTodayUpdates();
  const [year, month, day] = LAST_UPDATED.split(" ")[0].split("-");
  const months = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const dateStr = `${parseInt(day)} ${months[parseInt(month)-1]} ${year}`;
  const time = LAST_UPDATED.split(" ")[1];

  if (!players.length) {
    document.getElementById("updates-content").innerHTML =
      `<div style="padding:32px 16px;text-align:center;color:var(--muted)">Sem atualizações hoje.</div>`;
    return;
  }

  let cards = "";
  for (const p of players) {
    const isOutgoing = ["saida_oficial","saida_fechada","risco"].includes(p.status);
    const meta = [p.position, p.age ? `${p.age} anos` : null, isOutgoing ? p.toClub : p.fromClub].filter(Boolean).join(" · ");
    const feeLabel = p.fee || "";
    const avatarImg = p.photo
      ? `<img src="${p.photo}" alt="${p.name}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML=this.parentNode.dataset.emoji" />`
      : p.emoji;
    const dirTag = isOutgoing
      ? `<div class="dir-tag saida">↑ Saída</div>`
      : `<div class="dir-tag entrada">↓ Entrada</div>`;
    cards += `
      <div class="player-card" onclick="showDetail('${p.id}')">
        <div class="player-card-left">
          <div class="player-avatar" data-emoji="${p.emoji}">${avatarImg}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-meta">${meta}</div>
          </div>
        </div>
        <div class="player-card-right">
          ${dirTag}
          ${badge(p.status)}
          ${feeLabel ? `<span style="font-size:.75rem;color:var(--muted)">${feeLabel}</span>` : ""}
        </div>
      </div>`;
  }

  document.getElementById("updates-content").innerHTML =
    `<div class="updates-view-header">
      <div class="updates-view-title">📰 Atualizações de hoje</div>
      <div class="updates-view-sub">${dateStr} · ${time} · ${players.length} jogador${players.length > 1 ? "es" : ""}</div>
    </div>
    <div style="padding:16px 16px 0">${cards}</div>`;
}

function showUpdates() {
  renderUpdates();
  document.getElementById("list-view").classList.remove("active");
  document.getElementById("detail-view").classList.remove("active");
  document.getElementById("balance-view").classList.remove("active");
  document.getElementById("updates-view").classList.add("active");
  window.location.hash = "updates";
  window.scrollTo(0, 0);
}

function showBalance() {
  renderBalance();
  document.getElementById("list-view").classList.remove("active");
  document.getElementById("detail-view").classList.remove("active");
  document.getElementById("balance-view").classList.add("active");
  document.getElementById("updates-view").classList.remove("active");
  window.location.hash = "balance";
  window.scrollTo(0, 0);
}

// ── RENDER LIST ─────────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById("players-column");
  let html = "";

  for (const section of SECTIONS) {
    const players = PLAYERS.filter(p => p.status === section.key);
    if (!players.length) continue;

    html += `<div class="section-title">${STATUS[section.key].label.slice(0,2)} ${section.label}</div>`;

    for (const p of players) {
      const isOutgoing = ["saida_oficial","saida_fechada","risco"].includes(p.status);
      const meta = [p.position, p.age ? `${p.age} anos` : null,
        isOutgoing ? p.toClub : p.fromClub
      ].filter(Boolean).join(" · ");

      const feeLabel = p.fee || "";

      const avatarImg = p.photo
        ? `<img src="${p.photo}" alt="${p.name}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML=this.parentNode.dataset.emoji" />`
        : p.emoji;

      html += `
        <div class="player-card" onclick="showDetail('${p.id}')">
          <div class="player-card-left">
            <div class="player-avatar" data-emoji="${p.emoji}">${avatarImg}</div>
            <div class="player-info">
              <div class="player-name">${p.name}</div>
              <div class="player-meta">${meta}</div>
            </div>
          </div>
          <div class="player-card-right">
            ${badge(p.status)}
            ${feeLabel ? `<span style="font-size:.75rem;color:var(--muted)">${feeLabel}</span>` : ""}
            ${staleTag(p)}
          </div>
        </div>`;
    }
  }

  container.innerHTML = html;
  renderBalanceChip();
  renderUpdatesChip();
}

// ── RENDER DETAIL ────────────────────────────────────────────────────────────
function renderDetail(id) {
  const p = PLAYERS.find(x => x.id === id);
  if (!p) return;

  const isIn = ["oficial","fechado","negociacao","analise"].includes(p.status);
  const clubLine = isIn
    ? `${p.fromClub} <span style="opacity:.7">→</span> Sporting CP`
    : `Sporting CP <span style="opacity:.7">→</span> ${p.toClub}`;

  const lastNewsStat = (() => {
    if (!RUMOR_STATUSES.has(p.status) || !p.last_news) return null;
    const d = daysAgo(p.last_news);
    const months = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
    const [y, m, day] = p.last_news.split("-");
    const label = `${parseInt(day)} ${months[parseInt(m)-1]}`;
    const style = d >= 15 ? `color:var(--status-negociacao)` : d >= 8 ? `color:var(--muted)` : "";
    return { value: `<span${style ? ` style="${style}"` : ""}>${label} <span style="font-size:.8em;opacity:.75">(há ${d}d)</span></span>`, label: "Última notícia" };
  })();

  const stats = [
    p.position  ? { value: p.position,  label: "Posição" } : null,
    p.age       ? { value: `${p.age} anos`, label: "Idade" } : null,
    p.fee       ? { value: p.fee,        label: "Valor estimado" } : null,
    p.contract  ? { value: p.contract,   label: "Contrato" } : null,
    lastNewsStat,
  ].filter(Boolean);

  const statsHtml = stats.length
    ? `<div class="detail-grid">${stats.map(s =>
        `<div class="detail-stat">
          <div class="detail-stat-value">${s.value}</div>
          <div class="detail-stat-label">${s.label}</div>
        </div>`).join("")}</div>` : "";

  const sourcesHtml = p.sources.length
    ? `<div class="detail-section">
        <div class="detail-label">Fontes</div>
        <ul class="sources-list">${p.sources.map(s =>
          `<li><a href="${s.url}" target="_blank">↗ ${s.label}</a></li>`
        ).join("")}</ul>
       </div>` : "";

  const notesHtml = p.notes
    ? `<div class="warning-box"><span>ℹ️</span><span>${p.notes}</span></div>` : "";

  document.getElementById("detail-content").innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-inner">
        <div class="detail-avatar" data-emoji="${p.emoji}">${p.photo ? `<img src="${p.photo}" alt="${p.name}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML=this.parentNode.dataset.emoji" />` : p.emoji}</div>
        <div class="detail-name">${p.name}</div>
        <div class="detail-subtitle">${clubLine}</div>
        <div class="detail-badge-wrap">${badge(p.status)}</div>
      </div>
    </div>
    <div class="detail-body">
      ${statsHtml}
      <div class="detail-section">
        <div class="detail-label">Situação</div>
        <div class="detail-text">${p.description}</div>
        ${notesHtml}
      </div>
      ${sourcesHtml}
    </div>`;
}

// ── ROUTING ──────────────────────────────────────────────────────────────────
function showList() {
  document.getElementById("list-view").classList.add("active");
  document.getElementById("detail-view").classList.remove("active");
  document.getElementById("balance-view").classList.remove("active");
  document.getElementById("updates-view").classList.remove("active");
  window.location.hash = "";
}

function showDetail(id) {
  renderDetail(id);
  document.getElementById("list-view").classList.remove("active");
  document.getElementById("detail-view").classList.add("active");
  window.location.hash = `player/${id}`;
  window.scrollTo(0, 0);
}

function handleRoute() {
  const hash = window.location.hash.replace("#", "");
  if (hash === "balance") {
    renderBalance();
    document.getElementById("list-view").classList.remove("active");
    document.getElementById("detail-view").classList.remove("active");
    document.getElementById("balance-view").classList.add("active");
    document.getElementById("updates-view").classList.remove("active");
  } else if (hash === "updates") {
    renderUpdates();
    document.getElementById("list-view").classList.remove("active");
    document.getElementById("detail-view").classList.remove("active");
    document.getElementById("balance-view").classList.remove("active");
    document.getElementById("updates-view").classList.add("active");
  } else if (hash.startsWith("player/")) {
    const id = hash.replace("player/", "");
    renderDetail(id);
    document.getElementById("list-view").classList.remove("active");
    document.getElementById("detail-view").classList.add("active");
    document.getElementById("balance-view").classList.remove("active");
    document.getElementById("updates-view").classList.remove("active");
  } else {
    showList();
  }
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  const next = isDark ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  document.getElementById("theme-toggle").textContent = next === "dark" ? "☀️" : "🌙";
  localStorage.setItem("theme", next);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
if (document.documentElement.getAttribute("data-theme") === "dark") {
  document.getElementById("theme-toggle").textContent = "☀️";
}
document.getElementById("header-date").textContent =
  new Date().toLocaleDateString("pt-PT", { day: "numeric", month: "long", year: "numeric" });
document.getElementById("header-updated").textContent = "Actualizado: " + LAST_UPDATED;
renderCountdown();
renderList();
handleRoute();
window.addEventListener("hashchange", handleRoute);
</script>
