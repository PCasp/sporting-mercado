      --green-dark: #056635;
      --green-light: #e8f7ef;
      --white: #ffffff;

      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;

      --status-oficial-bg: #e8f7ef;
      --status-fechado: #2563eb;
      --status-fechado-bg: #eff6ff;

      --status-negociacao-bg: #fffbeb;

      --status-saida-oficial-bg: #fef2f2;
      --status-saida-fechada: #7c3aed;
      --status-saida-fechada-bg: #f5f3ff;
      --status-risco: #ea580c;
      --status-risco-bg: #fff7ed;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .02em;
    }
    .header-badge { width: 34px; height: 34px; object-fit: contain; }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }
    .header-date { font-size: .78rem; opacity: .85; }
    .header-updated { font-size: .68rem; opacity: .65; }

    /* ── LAYOUT ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── LIST VIEW ── */
    #list-view { padding: 24px 16px 48px; max-width: 720px; margin: 0 auto; }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .section-title:first-child { margin-top: 0; }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
      text-decoration: none;
      color: inherit;
    }
    .player-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }
    .player-card-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .player-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .player-info { min-width: 0; }
    .player-name {
      font-weight: 600;
      font-size: .95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .player-card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .chevron { color: var(--muted); font-size: .9rem; }

    /* ── STATUS BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .badge.oficial        { background: var(--status-oficial-bg);        color: var(--status-oficial); }
    .badge.fechado        { background: var(--status-fechado-bg);        color: var(--status-fechado); }
    .badge.negociacao     { background: var(--status-negociacao-bg);     color: var(--status-negociacao); }
    .badge.analise        { background: var(--status-analise-bg);        color: var(--status-analise); }
    .badge.saida-oficial  { background: var(--status-saida-oficial-bg);  color: var(--status-saida-oficial); }
    .badge.saida-fechada  { background: var(--status-saida-fechada-bg);  color: var(--status-saida-fechada); }
    .badge.risco          { background: var(--status-risco-bg);          color: var(--status-risco); }

    /* ── DETAIL VIEW ── */
    #detail-view { max-width: 720px; margin: 0 auto; padding-bottom: 48px; }

    .detail-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 16px;
      font-size: .85rem;
      color: var(--green);
      font-weight: 600;
      cursor: pointer;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .detail-back:hover { background: var(--green-light); }

    .detail-hero {
      background: var(--green);
      color: white;
      padding: 28px 20px 24px;
    }
    .detail-hero-inner { max-width: 680px; margin: 0 auto; }
    .detail-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 14px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.4);
    }
    .detail-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-name { font-size: 1.5rem; font-weight: 800; line-height: 1.2; }
    .detail-subtitle { opacity: .85; font-size: .9rem; margin-top: 4px; }
    .detail-badge-wrap { margin-top: 14px; }

    .detail-body { padding: 20px 16px; }
    .detail-section { margin-bottom: 20px; }
    .detail-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .detail-text { font-size: .9rem; line-height: 1.6; color: var(--text); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .detail-stat-value { font-size: 1.05rem; font-weight: 700; }
    .detail-stat-label { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    .sources-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .sources-list a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--green-dark);
      text-decoration: none;

      background: var(--status-negociacao-bg);
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .82rem;
      color: #92400e;
      margin-top: 8px;
      display: flex;
      gap: 6px;

// ── SECTIONS ────────────────────────────────────────────────────────────────
const SECTIONS = [
  { key: "oficial",       label: "Entradas Confirmadas" },
  { key: "fechado",       label: "Negócio Fechado" },
  { key: "negociacao",    label: "Em Negociação" },
  { key: "analise",       label: "Em Análise" },
  { key: "saida_oficial", label: "Saídas Oficiais" },
  { key: "saida_fechada", label: "Saídas Fechadas" },
  { key: "risco",         label: "Em Risco de Sair" },
];

// ── HELPERS ─────────────────────────────────────────────────────────────────
function badge(statusKey) {
  const s = STATUS[statusKey];
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

// ── RENDER LIST ─────────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById("list-view");
  let html = "";

  for (const section of SECTIONS) {
    const players = PLAYERS.filter(p => p.status === section.key);
    if (!players.length) continue;

    html += `<div class="section-title">${STATUS[section.key].label.slice(0,2)} ${section.label}</div>`;

    for (const p of players) {
      const isOutgoing = ["saida_oficial","saida_fechada","risco"].includes(p.status);
      const meta = [p.position, p.age ? `${p.age} anos` : null,
        isOutgoing ? p.toClub : p.fromClub
      ].filter(Boolean).join(" · ");

      const feeLabel = p.fee || "";

      const avatarImg = p.photo
        ? `<img src="${p.photo}" alt="${p.name}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML=this.parentNode.dataset.emoji" />`
        : p.emoji;

      html += `
        <div class="player-card" onclick="showDetail('${p.id}')">
          <div class="player-card-left">
            <div class="player-avatar" data-emoji="${p.emoji}">${avatarImg}</div>
            <div class="player-info">
              <div class="player-name">${p.name}</div>
              <div class="player-meta">${meta}</div>
            </div>
          </div>
          <div class="player-card-right">
            ${badge(p.status)}
            ${feeLabel ? `<span style="font-size:.75rem;color:var(--muted)">${feeLabel}</span>` : ""}
          </div>
        </div>`;
    }
  }

  container.innerHTML = html;
}

// ── RENDER DETAIL ────────────────────────────────────────────────────────────
function renderDetail(id) {
  const p = PLAYERS.find(x => x.id === id);
  if (!p) return;

  const isIn = ["oficial","fechado","negociacao","analise"].includes(p.status);
  const clubLine = isIn
    ? `${p.fromClub} <span style="opacity:.7">→</span> Sporting CP`
    : `Sporting CP <span style="opacity:.7">→</span> ${p.toClub}`;

  const stats = [
    p.position  ? { value: p.position,  label: "Posição" } : null,
    p.age       ? { value: `${p.age} anos`, label: "Idade" } : null,
    p.fee       ? { value: p.fee,        label: "Valor estimado" } : null,
    p.contract  ? { value: p.contract,   label: "Contrato" } : null,
  ].filter(Boolean);

  const statsHtml = stats.length
    ? `<div class="detail-grid">${stats.map(s =>
        `<div class="detail-stat">
          <div class="detail-stat-value">${s.value}</div>
          <div class="detail-stat-label">${s.label}</div>
        </div>`).join("")}</div>` : "";

  const sourcesHtml = p.sources.length
    ? `<div class="detail-section">
        <div class="detail-label">Fontes</div>
        <ul class="sources-list">${p.sources.map(s =>
          `<li><a href="${s.url}" target="_blank">↗ ${s.label}</a></li>`
        ).join("")}</ul>
       </div>` : "";

  const notesHtml = p.notes
    ? `<div class="warning-box"><span>ℹ️</span><span>${p.notes}</span></div>` : "";

  document.getElementById("detail-content").innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-inner">
        <div class="detail-avatar" data-emoji="${p.emoji}">${p.photo ? `<img src="${p.photo}" alt="${p.name}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML=this.parentNode.dataset.emoji" />` : p.emoji}</div>
        <div class="detail-name">${p.name}</div>
        <div class="detail-subtitle">${clubLine}</div>
        <div class="detail-badge-wrap">${badge(p.status)}</div>
      </div>
    </div>
    <div class="detail-body">
      ${statsHtml}
      <div class="detail-section">
        <div class="detail-label">Situação</div>
        <div class="detail-text">${p.description}</div>
        ${notesHtml}
      </div>
      ${sourcesHtml}
    </div>`;
}

// ── ROUTING ──────────────────────────────────────────────────────────────────
function showList() {
  document.getElementById("list-view").classList.add("active");
  document.getElementById("detail-view").classList.remove("active");
  window.location.hash = "";
}

function showDetail(id) {
  renderDetail(id);
  document.getElementById("list-view").classList.remove("active");
  document.getElementById("detail-view").classList.add("active");
  window.location.hash = `player/${id}`;
  window.scrollTo(0, 0);
}

function handleRoute() {
  const hash = window.location.hash.replace("#", "");
  if (hash.startsWith("player/")) {
    const id = hash.replace("player/", "");
    renderDetail(id);
    document.getElementById("list-view").classList.remove("active");
    document.getElementById("detail-view").classList.add("active");
  } else {
    showList();
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById("header-date").textContent =
  new Date().toLocaleDateString("pt-PT", { day: "numeric", month: "long", year: "numeric" });
document.getElementById("header-updated").textContent = "Actualizado: " + LAST_UPDATED;
renderList();
handleRoute();
window.addEventListener("hashchange", handleRoute);
</script>
