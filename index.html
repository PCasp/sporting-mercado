<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sporting CP · Mercado Verão 2026</title>
  <script>(function(){const t=localStorage.getItem("theme");if(t!=="light")document.documentElement.setAttribute("data-theme","dark");})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #07A04A;
      --green-dark: #056635;
      --green-light: #dcfce7;
      --white: #ffffff;
      --bg: #f0fdf4;
      --card: rgba(255,255,255,0.92);
      --surface: #f0fdf4;
      --text: #0f1f17;
      --muted: #6b7280;
      --border: rgba(7,160,74,0.18);
      --header-bg: rgba(7,160,74,0.94);
      --shadow: rgba(0,0,0,0.08);

      --status-oficial: #15803d;
      --status-oficial-bg: rgba(7,160,74,0.10);
      --status-fechado: #1d4ed8;
      --status-fechado-bg: rgba(37,99,235,0.10);
      --status-negociacao: #b45309;
      --status-negociacao-bg: rgba(217,119,6,0.10);
      --status-analise: #6b7280;
      --status-analise-bg: rgba(107,114,128,0.08);
      --status-saida-oficial: #b91c1c;
      --status-saida-oficial-bg: rgba(220,38,38,0.10);
      --status-saida-fechada: #6d28d9;
      --status-saida-fechada-bg: rgba(124,58,237,0.10);
      --status-saida-negociacao: #be185d;
      --status-saida-negociacao-bg: rgba(190,24,93,0.10);
      --status-risco: #c2410c;
      --status-risco-bg: rgba(234,88,12,0.10);
      --status-clausula: #0e7490;
      --status-clausula-bg: rgba(14,116,144,0.10);
    }

    [data-theme="dark"] {
      --bg: #060f09;
      --card: rgba(13,25,17,0.78);
      --surface: #0d1f13;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(7,160,74,0.16);
      --green-light: #071a0d;
      --header-bg: rgba(6,15,9,0.90);
      --shadow: rgba(0,0,0,0.4);

      --status-oficial: #22c55e;
      --status-oficial-bg: rgba(7,160,74,0.13);
      --status-fechado: #60a5fa;
      --status-fechado-bg: rgba(37,99,235,0.13);
      --status-negociacao: #fbbf24;
      --status-negociacao-bg: rgba(217,119,6,0.13);
      --status-analise: #94a3b8;
      --status-analise-bg: rgba(148,163,184,0.08);
      --status-saida-oficial: #f87171;
      --status-saida-oficial-bg: rgba(220,38,38,0.13);
      --status-saida-fechada: #c084fc;
      --status-saida-fechada-bg: rgba(124,58,237,0.13);
      --status-saida-negociacao: #f472b6;
      --status-saida-negociacao-bg: rgba(219,39,119,0.13);
      --status-risco: #fb923c;
      --status-risco-bg: rgba(234,88,12,0.13);
      --status-clausula: #22d3ee;
      --status-clausula-bg: rgba(14,116,144,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(7,160,74,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(7,160,74,0.03) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* ── HEADER ── */
    header {
      background: var(--header-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(7,160,74,0.20);
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .02em;
    }
    .header-badge { width: 34px; height: 34px; object-fit: contain; }
    .header-right {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .header-dates {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }
    .header-date { font-size: .78rem; opacity: .85; }
    .header-updated { font-size: .68rem; opacity: .65; }
    /* .header-countdown removed — countdown moved to sidebar card */
    .theme-toggle {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 9px;
      line-height: 1;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.28); }

    /* ── LAYOUT ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── LIST VIEW ── */
    #list-layout {
      display: flex;
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      align-items: flex-start;
    }
    #players-column { flex: 1; min-width: 0; }
    #balance-side {
      width: 172px;
      flex-shrink: 0;
      position: sticky;
      top: 76px;
    }

    /* ── BALANCE CARD (sidebar) ── */
    .balance-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 14px;
      cursor: pointer;
      text-align: center;
      transition: border-color .2s, box-shadow .2s;
      margin-top: 10px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .balance-card:hover { border-color: rgba(7,160,74,0.35); box-shadow: 0 0 24px rgba(7,160,74,0.09); }
    .balance-card-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .balance-card-value { font-size: 1.35rem; font-weight: 800; line-height: 1.1; }
    .balance-card-value.positive { color: var(--green); }
    .balance-card-value.negative { color: #dc2626; }
    .balance-card-sub { font-size: .7rem; color: var(--muted); margin-top: 8px; line-height: 1.55; }
    .balance-card-hint {
      font-size: .7rem;
      color: var(--green-dark);
      font-weight: 600;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    @media (max-width: 599px) {
      #list-layout { flex-direction: column-reverse; gap: 0; padding-bottom: 48px; }
      #balance-side { width: 100%; position: static; padding-bottom: 12px; }
      .balance-card { display: flex; align-items: center; gap: 14px; text-align: left; padding: 12px 14px; }
      .balance-card-label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
      .balance-card-value { font-size: 1.15rem; }
      .balance-card-sub { margin-top: 0; }
      .balance-card-hint { display: none; }
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-title:first-child { margin-top: 0; }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      text-decoration: none;
      color: inherit;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .player-card:hover {
      border-color: rgba(7,160,74,0.38);
      box-shadow: 0 0 30px rgba(7,160,74,0.10);
      transform: translateY(-2px);
    }
    .player-card-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .player-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .player-info { min-width: 0; }
    .player-name {
      font-weight: 600;
      font-size: .95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .player-card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      margin-left: 12px;
      max-width: 48%;
    }
    .fee-chip {
      white-space: normal;
      text-align: right;
      word-break: break-word;
      line-height: 1.3;
    }
    .chevron { color: var(--muted); font-size: .9rem; }

    /* ── STATUS BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: .67rem;
      font-weight: 600;
      letter-spacing: .03em;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .badge.oficial        { background: var(--status-oficial-bg);        color: var(--status-oficial);        border-color: rgba(7,160,74,0.25); }
    .badge.fechado        { background: var(--status-fechado-bg);        color: var(--status-fechado);        border-color: rgba(37,99,235,0.25); }
    .badge.negociacao     { background: var(--status-negociacao-bg);     color: var(--status-negociacao);     border-color: rgba(217,119,6,0.25); }
    .badge.analise        { background: var(--status-analise-bg);        color: var(--status-analise);        border-color: rgba(107,114,128,0.18); }
    .badge.saida-oficial     { background: var(--status-saida-oficial-bg);     color: var(--status-saida-oficial);     border-color: rgba(220,38,38,0.25); }
    .badge.saida-fechada     { background: var(--status-saida-fechada-bg);     color: var(--status-saida-fechada);     border-color: rgba(124,58,237,0.25); }
    .badge.saida-negociacao  { background: var(--status-saida-negociacao-bg);  color: var(--status-saida-negociacao);  border-color: rgba(190,24,93,0.25); }
    .badge.risco             { background: var(--status-risco-bg);             color: var(--status-risco);             border-color: rgba(234,88,12,0.25); }
    .badge.clausula          { background: var(--status-clausula-bg);          color: var(--status-clausula);          border-color: rgba(14,116,144,0.25); }

    /* ── DETAIL VIEW ── */
    #detail-view { max-width: 720px; margin: 0 auto; padding-bottom: 48px; }

    .detail-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      font-size: .85rem;
      color: var(--green);
      font-weight: 600;
      cursor: pointer;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: color .15s, background .15s;
    }
    .detail-back:hover { background: var(--green-light); color: var(--green-dark); }

    .detail-hero {
      background: linear-gradient(135deg, rgba(7,160,74,0.22), rgba(6,15,9,0.85));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(7,160,74,0.20);
      color: white;
      padding: 28px 20px 24px;
      position: relative;
      overflow: hidden;
    }
    .detail-hero::before {
      content: '';
      position: absolute;
      right: -60px; top: -60px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(7,160,74,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .detail-hero-inner { max-width: 680px; margin: 0 auto; }
    .detail-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 14px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.4);
    }
    .detail-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-name { font-size: 1.5rem; font-weight: 800; line-height: 1.2; }
    .detail-subtitle { opacity: .85; font-size: .9rem; margin-top: 4px; }
    .detail-badge-wrap { margin-top: 14px; }

    .detail-body { padding: 20px 16px; }
    .detail-section { margin-bottom: 20px; }
    .detail-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .detail-text { font-size: .9rem; line-height: 1.6; color: var(--text); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .detail-stat-value { font-size: 1.05rem; font-weight: 700; }
    .detail-stat-label { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    .sources-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .sources-list a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--green-dark);
      text-decoration: none;
      font-weight: 500;
    }
    .sources-list a:hover { text-decoration: underline; }

    .warning-box {
      background: var(--status-negociacao-bg);
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .82rem;
      color: #92400e;
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }

    /* ── BALANCE VIEW ── */
    #balance-view { max-width: 720px; margin: 0 auto; padding-bottom: 48px; }
    .balance-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .balance-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .balance-table tr:last-child td { border-bottom: none; }
    .balance-table .bt-name { font-weight: 600; }
    .balance-table .bt-club { color: var(--muted); font-size: .78rem; }
    .balance-table .bt-fee { text-align: right; font-weight: 700; white-space: nowrap; }
    .balance-table .bt-fee-max { color: var(--muted); font-weight: 400; font-size: .75rem; }
    .balance-total-row td { font-weight: 700; background: var(--bg); border-top: 2px solid var(--border); }
    .balance-net-box { margin: 20px 16px 0; padding: 16px; border-radius: 12px; text-align: center; }
    .balance-net-box.positive { background: var(--status-oficial-bg); color: var(--status-oficial); }
    .balance-net-box.negative { background: var(--status-saida-oficial-bg); color: var(--status-saida-oficial); }
    .balance-net-value { font-size: 1.8rem; font-weight: 800; }
    .balance-net-label { font-size: .8rem; margin-top: 4px; opacity: .85; }
    .balance-footnote { margin: 12px 16px 0; font-size: .75rem; color: var(--muted); text-align: center; }

    /* ── UPDATES CARD (sidebar) ── */
    .updates-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      margin-top: 10px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .updates-card:hover { border-color: rgba(7,160,74,0.35); box-shadow: 0 0 24px rgba(7,160,74,0.09); }
    .updates-card-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .updates-card-count { font-size: .9rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .updates-card-time { font-size: .7rem; color: var(--muted); margin-bottom: 8px; }
    .updates-player-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
    .updates-player-name { font-size: .78rem; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .updates-more { font-size: .72rem; color: var(--muted); margin-top: 3px; }
    .updates-card-hint {
      font-size: .7rem;
      color: var(--green-dark);
      font-weight: 600;
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    /* ── UPDATES VIEW ── */
    #updates-view { max-width: 720px; margin: 0 auto; padding-bottom: 48px; }
    .updates-view-header {
      padding: 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .updates-view-title { font-size: 1rem; font-weight: 700; }
    .updates-view-sub { font-size: .78rem; color: var(--muted); margin-top: 3px; }
    .dir-tag { font-size: .65rem; font-weight: 700; letter-spacing: .04em; white-space: nowrap; margin-bottom: 4px; }
    .dir-tag.entrada { color: var(--green); }
    .dir-tag.saida   { color: #dc2626; }

    /* ── STALENESS ── */
    .stale-tag { display: inline-block; font-size: .63rem; font-weight: 600; padding: 2px 6px; border-radius: 999px; margin-top: 3px; white-space: nowrap; }
    .stale-tag.stale-muted { background: var(--status-analise-bg); color: var(--muted); }
    .stale-tag.stale-warn  { background: var(--status-negociacao-bg); color: var(--status-negociacao); }
    .vm-tag { display: inline-block; font-size: .68rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; margin-top: 3px; white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* ── COUNTDOWN CARD (sidebar) ── */
    .countdown-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 14px;
      text-align: center;
      margin-top: 10px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .countdown-card-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .countdown-card-value { font-size: 1.35rem; font-weight: 800; line-height: 1.2; color: var(--text); }
    .countdown-card-value.urgent { color: #dc2626; }
    .countdown-card-sub { font-size: .7rem; color: var(--muted); margin-top: 8px; }
    .cd-days { display: block; }
    .cd-time { display: block; font-size: 1.05rem; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: .05em; }

    @media (max-width: 599px) {
      .countdown-card {
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: left;
        padding: 12px 14px;
        margin-top: 0;
      }
      .countdown-card-label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
      .countdown-card-value { font-size: 1.05rem; }
      .cd-time { font-size: .9rem; }
      .countdown-card-sub { margin-top: 0; }
    }

    @media (max-width: 599px) {
      .updates-card {
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: left;
        padding: 12px 14px;
        margin-top: 0;
      }
      .updates-card-label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
      #updates-chip-content { flex: 1; }
      .updates-card-count { margin-bottom: 0; font-size: .85rem; }
      .updates-card-time { margin-bottom: 0; }
      .updates-player-row, .updates-more, .updates-card-hint { display: none; }
    }

    /* ── RATING CARD (sidebar) ── */
    .rating-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 14px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      margin-top: 10px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .rating-card:hover { border-color: rgba(7,160,74,0.35); box-shadow: 0 0 24px rgba(7,160,74,0.09); }

    .dash-recent-card {

// ── DATA ────────────────────────────────────────────────────────────────────
const STATUS = {

    description: "Capitão do Sporting CP, o médio dinamarquês tem interesse de vários grandes clubes. O Real Madrid de Mourinho chegou a ser associado, e Arsenal e Manchester United também acompanham. O Atlético de Madrid é contudo o clube mais activo: em fevereiro de 2026 apresentou uma proposta de €25M (recusada pelo Sporting), e existe um acordo tácito com Hjulmand que lhe permite sair por €40-50M, abaixo da cláusula de €80M. A 2 de junho o Atlético de Madrid volta à carga com proposta de €40M + €6M/ano para Hjulmand. A 11 de junho o O Jogo revela que o Atlético de Madrid formalizou proposta de €40M ao Sporting. O dinamarquês quer sair e acordou com Varandas uma saída abaixo da cláusula de €80M. A 16 de junho o AC Milan de Rúben Amorim surge na corrida (Di Marzio via O Jogo), com Hjulmand e Trincão como 'dois favoritos' do técnico — o Atlético mantém posição privilegiada. A 21 de junho o O Jogo revela que Varandas prometeu formalmente a Hjulmand que lhe permitirá sair por ~€40M. Braço-de-ferro entre Atlético (€40M + €6M/ano) e AC Milan (Amorim). A 25 de junho a A Bola revela que o Manchester City de Enzo Maresca também está atento: Hugo Viana — diretor desportivo dos citizens e o mesmo que trouxe Hjulmand do Lecce para o Sporting em 2023 — tem o dossiê na mesa. Situação ainda em fase embrionária; o City tem outras prioridades (Elliot Anderson, Sandro Tonali), mas o interesse é real. A 26 de junho o Record confirma que Hjulmand já se despediu dos companheiros de equipa e do staff técnico — sinal inequívoco de que a saída está praticamente decidida. O capitão acredita que o futuro ficará resolvido antes do arranque da pré-época. O AC Milan de Rúben Amorim surge como o clube que mais pressiona nesta fase, com o factor pessoal do técnico — que trouxe Hjulmand do Lecce em 2023 e lhe entregou a braçadeira — a pesar de forma determinante. A 28 de junho a Gazzetta dello Sport garante que houve reunião em Lisboa entre Rúben Amorim e a direção do AC Milan (Hendrik Almstadt nsferência — o Atlético quer fechar o negócio antes de 13 de julho, data do regresso da equipa aos treinos, segundo a Marca. Sporting mantém-se nos €40M+bónus, Atlético na proposta de €35M — semana considerada decisiva para resolver o diferencial de €5M. O O Jogo confirma às 17h16 de 7 de julho que o acordo entre os CLUBES (não apenas com o jogador) está agora iminente — os empresários de Hjulmand encontram-se em Madrid para «acertarem os derradeiros pormenores». Diego Simeone regressa em breve das férias nos EUA e quer o dinamarquês disponível para o arranque da pré-época, marcado para segunda-feira. O Record (via Marca, 07h03 de 8 de julho) confirma que os representantes de Hjulmand — da agência BTAM — reuniram-se ontem em Madrid com Mateu Alemany, diretor desportivo do Atlético, para fechar os últimos detalhes. Objetivo do clube espanhol: ter o negócio fechado até segunda-feira. O Record acrescenta (8 de julho) que as boas relações com Mateu Alemany foram determinantes para os colchoneros subirem a parada: acordo agora desenhado nos €40M fixos + €5M variáveis, o tal 'bolo' de €45M — Sporting e Atlético 'muito perto de chegarem a acordo'. Proposta formal do Atlético esperada nas próximas horas. A 9 de julho (08h41, atualizado 09h33) a A Bola confirma: negócio FECHADO entre Sporting e Atlético de Madrid — €40M fixos + €5M em bónus, contrato de 5 épocas até 2031. Hjulmand viaja já hoje para Madrid, mas fará antes uma despedida em Lisboa. Chegou do Lecce há 3 anos por €19,5M — 141 jogos, 10 golos, 12 assistências, 2 campeonatos e 1 Taça de Portugal ao serviço do Sporting. A A Bola detalha (11h58) a estrutura dos €5M em bónus: até €3M em prémios individuais (€750k por cada série de 30 jogos com 45+ minutos sob Simeone, até um máximo de 120 jogos) e até €2M em prémios coletivos ligados ao percurso do Atlético na Champions League (€500k qualificação, €250k oitavos, €250k quartos, €500k meias, €1M final) — bónus cumulativos, atingíveis no mesmo ano. Contrato de 5 épocas // ── HELPERS ─────────────────────────────────────────────────────────────────
function badge(statusKey) {
  const s = STATUS[statusKey];
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

const RUMOR_STATUSES = new Set(["analise", "negociacao", "risco", "saida_negociacao"]);

function daysAgo(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return Math.floor((today - new Date(dateStr)) / 86400000);
}

function staleTag(p) {
  if (!RUMOR_STATUSES.has(p.status) || !p.last_news) return "";
  const d = daysAgo(p.last_news);
  if (d < 8)  return "";
  if (d < 15) return `<span class="stale-tag stale-muted">há ${d}d</span>`;
  return `<span class="stale-tag stale-warn">há ${d}d</span>`;
}

function renderCountdown() {
  const CLOSE = new Date("2026-09-01T00:00:00");
  const valEl = document.getElementById("countdown-value");
  const subEl = document.getElementById("countdown-sub");
  if (!valEl) return;

  function tick() {
    const diff = CLOSE - new Date();
    if (diff <= 0) {
      valEl.innerHTML = "—";
      valEl.className = "countdown-card-value";
      if (subEl) subEl.textContent = "Janela fechada";
      clearInterval(window._cdTimer);
      return;
    }
    const total = Math.floor(diff / 1000);
    const d = Math.floor(total / 86400);
    const h = Math.floor((total % 86400) / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    const p = n => String(n).padStart(2, "0");
    valEl.innerHTML = `<span class="cd-days">${d}d</span><span class="cd-time">${p(h)}:${p(m)}:${p(s)}</span>`;
    valEl.className = "countdown-card-value" + (d <= 7 ? " urgent" : "");
    if (subEl) subEl.textContent = "fecho: 31 ago 2026";
  }

  clearInterval(window._cdTimer);
  tick();
  window._cdTimer = setInterval(tick, 1000);
}

// ── BALANCE ──────────────────────────────────────────────────────────────────
function computeBalance() {
  const incoming = PLAYERS.filter(p => p.status === "oficial" && p.fee_value != null);
  const outgoing = PLAYERS.filter(p => p.status === "saida_oficial" && p.fee_value != null);
  const totalIn  = incoming.reduce((s, p) => s + p.fee_value, 0);
  const totalOut = outgoing.reduce((s, p) => s + p.fee_value, 0);
  return { incoming, outgoing, totalIn, totalOut, net: totalOut - totalIn };
}

function fmtM(v) {
  return (v % 1 === 0 ? v.toFixed(0) : v.toFixed(1)) + "M";
}

function parseVM(s) {
  if (!s) return null;
  const clean = s.replace("€", "").trim();
  if (clean.endsWith("M")) return parseFloat(clean) || 0;
  if (clean.endsWith("k")) return (parseFloat(clean) || 0) / 1000;
  return parseFloat(clean) || null;
}

function gradeClass(g) {
  if (g.startsWith("A")) return "grade-A";
  if (g.startsWith("B")) return "grade-B";
  if (g.startsWith("C")) return "grade-C";
  if (g === "D") return "grade-D";
  return "grade-F";
}

function computeRating() {
  // Index 1: Saldo financeiro
  const { totalIn, totalOut, net } = computeBalance();
  const score1 = Math.max(0, Math.min(10, (net + 60) / 90 * 10));

  // Index 2: Eficiência de compras (fee vs VM for oficial incoming with fee > 0)
  const incomingPaid = PLAYERS.filter(p => p.status === "oficial" && p.fee_value != null && p.fee_value > 0);
  const buyRatios = incomingPaid.map(p => { const vm = parseVM(p.market_value); return vm ? p.fee_value / vm : null; }).filter(r => r != null);
  let score2 = 5;
  let avgBuy = null;
  if (buyRatios.length > 0) {
    avgBuy = buyRatios.reduce((s, r) => s + r, 0) / buyRatios.length;
    score2 = Math.max(0, Math.min(10, (2 - avgBuy) * 5));
  }

  // Index 3: Eficiência de vendas (fee vs VM for saida_oficial with fee > 0)
  const outgoingPaid = PLAYERS.filter(p => p.status === "saida_oficial" && p.fee_value > 0);
  const sellRatios = outgoingPaid.map(p => { const vm = parseVM(p.market_value); return vm ? p.fee_value / vm : null; }).filter(r => r != null);
  let score3 = 5;
  let avgSell = null;
  if (sellRatios.length > 0) {
    avgSell = sellRatios.reduce((s, r) => s + r, 0) / sellRatios.length;
    score3 = Math.max(0, Math.min(10, avgSell * 5));
  }

  // Index 4: Reforço do plantel (VM of official transfers only)
  const CONF_IN  = ["oficial"];
  const CONF_OUT = ["saida_oficial"];
  const vmIn  = PLAYERS.filter(p => CONF_IN.includes(p.status))
                       .reduce((s, p) => s + (parseVM(p.market_value) || 0), 0);
  const vmOut = PLAYERS.filter(p => CONF_OUT.includes(p.status))
                       .reduce((s, p) => s + (parseVM(p.market_value) || 0), 0);
  const vmNet = vmIn - vmOut;
  const score4 = Math.max(0, Math.min(10, 5 + vmNet / 15));

  // Index 5: Perda de activos-chave (saida_oficial with VM >= 10M)
  const keyLost = PLAYERS.filter(p => p.status === "saida_oficial" && (parseVM(p.market_value) || 0) >= 10).length;
  const score5 = Math.max(0, Math.min(10, 10 - keyLost * 3));

  const indices = [
    { label: "Saldo financeiro",     score: score1,
      detail: `Net: ${net >= 0 ? "+" : "−"}€${fmtM(Math.abs(net))}` },
    { label: "Eficiência de compras", score: score2,
      detail: avgBuy != null ? `Ratio médio: ${avgBuy.toFixed(2)}× VM` : "Sem dados" },
    { label: "Eficiência de vendas",  score: score3,
      detail: avgSell != null ? `Ratio médio: ${avgSell.toFixed(2)}× VM` : "Sem dados" },
    { label: "Reforço do plantel",   score: score4,
      detail: `VM líquida: ${vmNet >= 0 ? "+" : "−"}€${fmtM(Math.abs(vmNet))}` },
    { label: "Activos-chave perdidos", score: score5,
      detail: `${keyLost} saída${keyLost !== 1 ? "s" : ""} com VM ≥ €10M` },
  ];

  const overall = indices.reduce((s, i) => s + i.score, 0) / indices.length;
  const grade = overall >= 8.5 ? "A+" : overall >= 7.5 ? "A" : overall >= 6.5 ? "B+" :
                overall >= 5.5 ? "B"  : overall >= 4.5 ? "C+" : overall >= 3.5 ? "C" :
                overall >= 2.5 ? "D"  : "F";
  return { indices, overall, grade };
}

function renderBalanceChip() {
  const { totalIn, totalOut, net } = computeBalance();
  const chip = document.getElementById("balance-chip");
  const sub  = document.getElementById("balance-sub");
  const sign = net >= 0 ? "+" : "−";
  chip.textContent = sign + "€" + fmtM(Math.abs(net));
  chip.className = "balance-card-value " + (net >= 0 ? "positive" : "negative");
  sub.innerHTML = "Receitas: €" + fmtM(totalOut) + "<br>Gastos: €" + fmtM(totalIn);
}

function renderBalance() {
  const { incoming, outgoing, totalIn, totalOut, net } = computeBalance();
  const sign = net >= 0 ? "+" : "−";
  const cls  = net >= 0 ? "positive" : "negative";

  function tableRows(players, isOutgoing) {
    return players.map(p => {
      const club = isOutgoing ? p.toClub : p.fromClub;
      const feeStr = p.fee_value === 0
        ? (isOutgoing ? "Fim de contrato / Sem valor" : "Sem valor")
        : "€" + fmtM(p.fee_value);
      const maxExtra = (p.fee_max != null && p.fee_max > p.fee_value)
        ? ` <span class="bt-fee-max">(até €${fmtM(p.fee_max)})</span>` : "";
      return `<tr>
        <td><div class="bt-name">${p.name}</div><div class="bt-club">${club}</div></td>
        <td class="bt-fee">${feeStr}${maxExtra}</td>
      </tr>`;
    }).join("");
  }

  function totalRow(label, value) {
    return `<tr class="balance-total-row">
      <td>${label}</td>
      <td class="bt-fee">€${fmtM(value)}</td>
    </tr>`;
  }

  document.getElementById("balance-content").innerHTML = `
    <div class="balance-net-box ${cls}">
      <div class="balance-net-value">${sign}€${fmtM(Math.abs(net))}</div>
      <div class="balance-net-label">Saldo líquido de transferências oficiais</div>
    </div>
    <div style="padding:20px 16px 0">
      <div class="detail-label" style="margin-bottom:10px">🚨 Saídas Oficiais</div>
      <table class="balance-table">
        ${tableRows(outgoing, true)}
        ${totalRow("Total receitas", totalOut)}
      </table>
    </div>
    <div style="padding:20px 16px 0">
      <div class="detail-label" style="margin-bottom:10px">✅ Entradas Oficiais</div>
      <table class="balance-table">
        ${tableRows(incoming, false)}
        ${totalRow("Total gastos", totalIn)}
      </table>
    </div>
    <div class="balance-footnote">Apenas transferências oficialmente anunciadas pelo clube</div>`;
}

// ── RATING ───────────────────────────────────────────────────────────────────
function renderRatingChip() {
  const { overall, grade } = computeRating();
  const chip  = document.getElementById("rating-grade-chip");
  const sub   = document.getElementById("rating-score-sub");
  if (!chip) return;
  chip.textContent = grade;
  chip.className = "rating-grade " + gradeClass(grade);
  if (sub) sub.textContent = overall.toFixed(1) + " / 10";
}

function renderRating() {
  const { indices, overall, grade } = computeRating();
  const gc = gradeClass(grade);

  function barClass(s) { return s >= 6.5 ? "bar-good" : s >= 4 ? "bar-mid" : "bar-bad"; }
  function ico(s)      { return s >= 6.5 ? "✅" : s >= 4 ? "⚠️" : "🔴"; }
  function item(s, text) { return `<div class="rating-narrative-item">${ico(s)} ${text}</div>`; }

  const [fin, buy, sell, squad, keyLoss] = indices;

  const gradeDesc = overall >= 8.5 ? "excelente" : overall >= 7.5 ? "muito bom" :
                    overall >= 6.5 ? "bom"        : overall >= 5.5 ? "razoável"  :
                    overall >= 4.5 ? "mediano"     : overall >= 3.5 ? "fraco"     : "muito fraco";

  const finVal  = fin.detail.replace("Net: ", "").replace("−", "−");
  const finText = fin.score >= 6.5
    ? `Saldo financeiro ${finVal} — receitas igualam ou superam o investimento.`
    : fin.score >= 4
    ? `Saldo financeiro ${finVal} — investimento moderadamente acima das receitas.`
    : `Saldo financeiro ${finVal} — investimento claramente superior às receitas.`;

  const buyText = buy.detail === "Sem dados"
    ? `<div class="rating-narrative-item">⚪ Eficiência de compras — sem contratações com fee confirmado para avaliar.</div>`
    : item(buy.score, buy.score >= 6.5
        ? `Compras eficientes (${buy.detail}) — valores pagos abaixo do mercado.`
        : buy.score >= 4
        ? `Compras razoáveis (${buy.detail}) — próximas do valor de mercado.`
        : `Compras caras (${buy.detail}) — prémios acima do valor de mercado.`);

  const sellText = sell.detail === "Sem dados"
    ? `<div class="rating-narrative-item">⚪ Eficiência de vendas — sem vendas com fee confirmado para avaliar.</div>`
    : item(sell.score, sell.score >= 6.5
        ? `Vendas acima do valor de mercado (${sell.detail}) — forte capacidade negocial.`
        : sell.score >= 4
        ? `Vendas equilibradas (${sell.detail}) — próximas do valor de mercado.`
        : `Vendas abaixo do valor de mercado (${sell.detail}) — margem negocial limitada.`);

  const squadText = squad.score >= 6.5
    ? `Plantel reforçado em valor de mercado (${squad.detail}) — entradas de maior qualidade que as saídas.`
    : squad.score >= 4
    ? `Valor de mercado do plantel estável (${squad.detail}) — substituições equivalentes.`
    : `Plantel enfraquecido (${squad.detail}) — saídas mais valiosas do que as entradas.`;

  const keyText = keyLoss.score >= 8
    ? `Nenhum activo-chave perdido — continuidade e estabilidade no plantel.`
    : keyLoss.score >= 5
    ? `${keyLoss.detail} — perda importante, mas gerível.`
    : `${keyLoss.detail} — impacto significativo na qualidade do plantel.`;

  const narrative = `
    <div class="rating-narrative">
      <div class="rating-narrative-title">Interpretação</div>
      <div class="rating-narrative-intro">Com <strong>${overall.toFixed(1)} pontos</strong> (nota <strong>${grade}</strong>), este é um mercado <strong>${gradeDesc}</strong>. Aqui está o que mais influencia a nota:</div>
      ${item(fin.score, finText)}${buyText}${sellText}${item(squad.score, squadText)}${item(keyLoss.score, keyText)}
    </div>`;

  const indexCards = indices.map(idx => `
    <div class="rating-index">
      <div class="rating-index-header">
        <span class="rating-index-name">${idx.label}</span>
        <span class="rating-index-score ${gradeClass(idx.score >= 8.5 ? "A+" : idx.score >= 7.5 ? "A" : idx.score >= 6.5 ? "B+" : idx.score >= 5.5 ? "B" : idx.score >= 4.5 ? "C+" : idx.score >= 3.5 ? "C" : idx.score >= 2.5 ? "D" : "F")}">${idx.score.toFixed(1)}</span>
      </div>
      <div class="rating-bar-bg"><div class="rating-bar-fill ${barClass(idx.score)}" style="width:${idx.score * 10}%"></div></div>
      <div class="rating-index-detail">${idx.detail}</div>
    </div>`).join("");

  document.getElementById("rating-content").innerHTML = `
    <div class="rating-hero">
      <div class="rating-hero-grade ${gc}">${grade}</div>
      <div class="rating-hero-score">${overall.toFixed(1)} / 10</div>
      <div class="rating-hero-label">Avaliação global do mercado de verão 2026</div>
    </div>
    ${narrative}
    <div class="rating-indices">${indexCards}</div>
    <div class="balance-footnote">Baseado em transferências confirmadas e valores de mercado (Transfermarkt)</div>`;
}

function getTodayUpdates() {
  const today = LAST_UPDATED.split(" ")[0];
  const entry = UPDATES_LOG.find(e => e.date === today);
  if (!entry) return [];
  return entry.ids.map(id => PLAYERS.find(p => p.id === id)).filter(Boolean);
}

function renderUpdatesChip() {
  const players = getTodayUpdates();
  const chip = document.getElementById("updates-chip-content");
  const time = LAST_UPDATED.split(" ")[1];

  if (!players.length) {
    chip.innerHTML = `<div class="updates-card-count" style="color:var(--muted);font-weight:400;font-style:italic">Sem atualizações hoje</div>`;
    return;
  }

  const preview = players.slice(0, 3);
  const extra = players.length - 3;
  let rows = preview.map(p =>
    `<div class="updates-player-row">
      ${badge(p.status)}
      <span class="updates-player-name">${p.name}</span>

  ).join("");

    `<div class="updates-card-time">${time}</div>` +

}

// ── RENDER DETAIL ────────────────────────────────────────────────────────────
function renderDetail(id) {
  const p = PLAYERS.find(x => x.id === id);
  if (!p) return;

  const isIn = ["oficial","fechado","negociacao","analise"].includes(p.status);
  const clubLine = p.status === "clausula"
    ? `${p.fromClub} <span style="opacity:.7">→</span> ${p.toClub}`
    : isIn
      ? `${p.fromClub} <span style="opacity:.7">→</span> Sporting CP`
      : `Sporting CP <span style="opacity:.7">→</span> ${p.toClub}`;

  const lastNewsStat = (() => {
    if (!RUMOR_STATUSES.has(p.status) || !p.last_news) return null;
    const d = daysAgo(p.last_news);
    const months = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
    const [y, m, day] = p.last_news.split("-");
    const label = `${parseInt(day)} ${months[parseInt(m)-1]}`;
    const style = d >= 15 ? `color:var(--status-negociacao)` : d >= 8 ? `color:var(--muted)` : "";
    return { value: `<span${style ? ` style="${style}"` : ""}>${label} <span style="font-size:.8em;opacity:.75">(há ${d}d)</span></span>`, label: "Última notícia" };
  })();

  const stats = [
    p.position      ? { value: p.position,         label: "Posição" } : null,
    p.age           ? { value: `${p.age} anos`,     label: "Idade" } : null,
    p.fee           ? { value: p.fee,               label: "Valor estimado" } : null,
    p.market_value  ? { value: p.market_value,      label: "Valor de mercado" } : null,
    p.contract      ? { value: p.contract,          label: "Contrato" } : null,
    lastNewsStat,
  ].filter(Boolean);

  const statsHtml = stats.length
    ? `<div class="detail-grid">${stats.map(s =>
        `<div class="detail-stat">
          <div class="detail-stat-value">${s.value}</div>
          <div class="detail-stat-label">${s.label}</div>
        </div>`).join("")}</div>` : "";

  const sourcesHtml = p.sources.length
    ? `<div class="detail-section">
        <div class="detail-label">Fontes</div>
        <ul class="sources-list">${p.sources.map(s =>
          `<li><a href="${s.url}" target="_blank">↗ ${s.label}</a></li>`
        ).join("")}</ul>
       </div>` : "";

  const notesHtml = p.notes
    ? `<div class="warning-box notes-box"><ul class="notes-list">${
        p.notes.replace(/\.\s*$/, "").split(/\.\s+/).map(b => `<li>${b}</li>`).join("")
      }</ul></div>` : "";

  document.getElementById("detail-content").innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-inner">
        <div class="detail-avatar" data-emoji="${p.emoji}">${p.photo ? `<img src="${p.photo}" alt="${p.name}" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML=this.parentNode.dataset.emoji" />` : p.emoji}</div>
        <div class="detail-name">${p.name}</div>
        <div class="detail-subtitle">${clubLine}</div>
        <div class="detail-badge-wrap">${badge(p.status)}</div>
      </div>
    </div>
    <div class="detail-body">
      ${statsHtml}
      <div class="detail-section">
        <div class="detail-label">Situação</div>
        <ul class="desc-list">${
          p.description.replace(/\.\s*$/, "").split(/\.\s+/).map(b => `<li>${b}</li>`).join("")
        }</ul>
        ${notesHtml}
      </div>
      ${sourcesHtml}
    </div>`;
}

function toggleSection(el) {
  el.classList.toggle("collapsed");
  el.nextElementSibling.classList.toggle("collapsed");
}

function posGroup(pos) {
  if (!pos) return null;
  const p = pos.toLowerCase();
  if (p === "gr" || p.includes("guarda")) return "GR";
  if (p === "dc") return "DC";
  if (p === "ld" || p === "lateral dto") return "LD";
  if (p === "le" || (p.includes("lateral") && p.includes("esq"))) return "LE";
  if (p === "md") return "MD";
  if (p === "mc" || p.includes("ofensivo")) return "MC";
  if (p.includes("ala")) return "EXT";
  if (p.includes("avan")) return "AV";
  return null;
}

  }

        d.inConf  ? `<span class="pos-ind pos-ind-in-conf">↓${d.inConf}</span>`  : "",
        d.inTalk  ? `<span class="pos-ind pos-ind-in-talk">↓${d.inTalk}</span>`  : "",
        d.outConf ? `<span class="pos-ind pos-ind-out-conf">↑${d.outConf}</span>` : "",
        d.outTalk ? `<span class="pos-ind pos-ind-out-talk">↑${d.outTalk}</span>` : "",
        d.outRisk ? `<span class="pos-ind pos-ind-out-risk">↑${d.outRisk}</span>` : "",
      ].join("");
      return `<div class="pos-cell">
        <div class="pos-cell-label">${g}</div>
        <div class="pos-indicators">${inds || '<span style="font-size:.6rem;color:var(--muted)">—</span>'}</div>
      </div>`;
    }).join("") + `</div>
    <div class="pos-legend">
      <span class="pos-ind pos-ind-in-conf">↓</span> Confirmado
      <span class="pos-ind pos-ind-in-talk" style="margin-left:6px">↓</span> Em negociação
      <span class="pos-ind pos-ind-out-conf" style="margin-left:6px">↑</span> Saída conf.
      <span class="pos-ind pos-ind-out-talk" style="margin-left:6px">↑</span> Saída em neg.
      <span class="pos-ind pos-ind-out-risk" style="margin-left:6px">↑</span> Em risco
    </div>`;

  // ── Headlines ──
  const HEADLINE_STATUS_PRIO = { risco:0, saida_negociacao:1, negociacao:2, analise:3, fechado:4, saida_fechada:5, saida_oficial:6, oficial:7, clausula:8 };
  const headlinePlayers = PLAYERS
    .filter(p => p.notes)
    .sort((a, b) => {
      const pa = HEADLINE_STATUS_PRIO[a.status] ?? 99;
      const pb = HEADLINE_STATUS_PRIO[b.status] ?? 99;
      if (pa !== pb) return pa - pb;
      return (b.last_news || "0").localeCompare(a.last_news || "0");
    });
  let headlinesHtml = "";
  if (headlinePlayers.length) {
    headlinesHtml = `<div class="dash-section-label">📰 Manchetes</div>`;
    headlinesHtml += headlinePlayers.slice(0, 4).map(p => {
      const note = p.notes.trim();
      const spaceIdx = note.indexOf(" ");
      const icon = spaceIdx > 0 ? note.slice(0, spaceIdx) : "📌";
      const text = spaceIdx > 0 ? note.slice(spaceIdx + 1) : note;
      const dir  = p.status === "clausula" ? "💰" : (["saida_oficial","saida_fechada","saida_negociacao","risco"].includes(p.status) ? "↑" : "↓");
      return `<div class="headline-card" onclick="showDetail('${p.id}')">
        <div class="headline-icon">${icon}</div>
        <div class="headline-body">
          <div class="headline-text">${text}</div>
          <div class="headline-player">${dir} ${p.name} · ${p.position}</div>
        </div>
      </div>`;
    }).join("");
    headlinesHtml += `<div style="height:8px"></div>`;
  }

  document.getElementById("dashboard-content").innerHTML = `
    <div class="stats-row">
      <div class="stat-card" onclick="showBalance()">
        <div class="stat-card-label">💰 Saldo</div>
        <div class="stat-card-value ${netCls}">${netSign}€${fmtM(Math.abs(net))}</div>
        <div class="stat-card-sub">Receitas €${fmtM(totalOut)}<br>Gastos €${fmtM(totalIn)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">⏳ Janela</div>
        <div id="countdown-value" class="stat-card-value"></div>
        <div id="countdown-sub" class="stat-card-sub"></div>
      </div>
      <div class="stat-card" onclick="showRating()">
        <div class="stat-card-label">🏆 Aval.</div>
        <div class="stat-card-value ${gradeClass(grade)}">${grade}</div>
        <div class="stat-card-sub">${overall.toFixed(1)} / 10</div>
      </div>
    </div>
    ${recentHtml}
    ${headlinesHtml}
    ${posMapHtml}
    <div class="dash-section-label">Navegar por categoria</div>
    <button class="cat-btn entradas" onclick="showEntradas()">
      <div class="cat-btn-row">
        <span class="cat-btn-title">↓ Entradas</span>
        <span class="cat-btn-count c-entrada">${entradas.length} jogadores</span>
      </div>
      <div class="cat-btn-sub">${inBreakdown || "Sem entradas registadas"}</div>
    </button>
    <button class="cat-btn saidas" onclick="showSaidas()">
      <div class="cat-btn-row">
        <span class="cat-btn-title">↑ Saídas</span>
        <span class="cat-btn-count c-saida">${saidas.length} jogadores</span>
      </div>
      <div class="cat-btn-sub">${outBreakdown || "Sem saídas registadas"}</div>
    </button>
    ${clausulas.length ? `
    <button class="cat-btn clausulas" onclick="showClausulas()">
      <div class="cat-btn-row">
        <span class="cat-btn-title">💰 Cláusulas</span>
        <span class="cat-btn-count c-clausula">${clausulas.length} jogador${clausulas.length !== 1 ? "es" : ""}</span>
      </div>
      <div class="cat-btn-sub">Encaixes por cláusulas de revenda (jogadores já fora do plantel)</div>
    </button>` : ""}`;
}

function showDashboard() {
  renderDashboard();
  renderCountdown();
  showOnly("dashboard-view");
  window.location.hash = "";
}

function renderEntradas() {
  const groups = [
    { key: "oficial",    label: STATUS.oficial.label,    players: PLAYERS.filter(p => p.status === "oficial") },
    { key: "fechado",    label: STATUS.fechado.label,    players: PLAYERS.filter(p => p.status === "fechado") },
    { key: "negociacao", label: STATUS.negociacao.label, players: PLAYERS.filter(p => p.status === "negociacao") },
    { key: "analise",    label: STATUS.analise.label,    players: PLAYERS.filter(p => p.status === "analise") },
  ].filter(g => g.players.length > 0);
  const total = groups.reduce((s, g) => s + g.players.length, 0);
  let html = "";
  for (const g of groups) {
    html += `
      <div class="col-sec-title" onclick="toggleSection(this)">
        <span>${g.label} <span style="opacity:.65">(${g.players.length})</span></span>
        <div class="col-sec-title-line"></div>
        <span class="col-sec-chevron">▼</span>
      </div>
      <div class="col-sec-body">${g.players.map(playerCardHtml).join("")}</div>`;
  }
  document.getElementById("entradas-content").innerHTML = `
    <div class="cat-view-header">
      <div class="cat-view-title">↓ Entradas · ${total} jogador${total !== 1 ? "es" : ""}</div>
    </div>
    <div style="padding:14px 16px 0">${html}</div>`;
}

function showEntradas() {
  renderEntradas();
  showOnly("entradas-view");
  window.location.hash = "entradas";
}

function renderSaidas() {
  const groups = [
    { key: "saida_oficial",    label: STATUS.saida_oficial.label,    players: PLAYERS.filter(p => p.status === "saida_oficial") },
    { key: "saida_fechada",    label: STATUS.saida_fechada.label,    players: PLAYERS.filter(p => p.status === "saida_fechada") },
    { key: "saida_negociacao", label: STATUS.saida_negociacao.label, players: PLAYERS.filter(p => p.status === "saida_negociacao") },
    { key: "risco",            label: STATUS.risco.label,            players: PLAYERS.filter(p => p.status === "risco") },
  ].filter(g => g.players.length > 0);
  const total = groups.reduce((s, g) => s + g.players.length, 0);
  let html = "";
  for (const g of groups) {
    html += `
      <div class="col-sec-title" onclick="toggleSection(this)">
        <span>${g.label} <span style="opacity:.65">(${g.players.length})</span></span>
        <div class="col-sec-title-line"></div>
        <span class="col-sec-chevron">▼</span>
      </div>
      <div class="col-sec-body">${g.players.map(playerCardHtml).join("")}</div>`;
  }
  document.getElementById("saidas-content").innerHTML = `
    <div class="cat-view-header">
      <div class="cat-view-title">↑ Saídas · ${total} jogador${total !== 1 ? "es" : ""}</div>
    </div>
    <div style="padding:14px 16px 0">${html}</div>`;
}

function showSaidas() {
  renderSaidas();
  showOnly("saidas-view");
  window.location.hash = "saidas";
}

function renderClausulas() {
  const players = PLAYERS.filter(p => p.status === "clausula");
  const total = players.length;
  const html = `
      <div class="col-sec-title" onclick="toggleSection(this)">
        <span>${STATUS.clausula.label} <span style="opacity:.65">(${total})</span></span>
        <div class="col-sec-title-line"></div>
        <span class="col-sec-chevron">▼</span>
      </div>
      <div class="col-sec-body">${players.map(playerCardHtml).join("")}</div>`;
  document.getElementById("clausulas-content").innerHTML = `
    <div class="cat-view-header">
      <div class="cat-view-title">💰 Cláusulas · ${total} jogador${total !== 1 ? "es" : ""}</div>
      <div class="cat-view-sub">Encaixes financeiros de jogadores que já não pertencem ao plantel do Sporting, via cláusulas de revenda / solidariedade FIFA em transferências entre outros clubes.</div>
    </div>
    <div style="padding:14px 16px 0">${html}</div>`;
}

function showClausulas() {
  renderClausulas();
  showOnly("clausulas-view");
  window.location.hash = "clausulas";
}

function goBack() {
  if (_previousView === "entradas-view") showEntradas();
  else if (_previousView === "saidas-view") showSaidas();
  else if (_previousView === "clausulas-view") showClausulas();
  else showDashboard();
}

// ── ROUTING ──────────────────────────────────────────────────────────────────
function showList() { showDashboard(); }

function showDetail(id) {
  _previousView = _currentView;
  renderDetail(id);
  showOnly("detail-view");
  window.location.hash = `player/${id}`;
}

function handleRoute() {
  const hash = window.location.hash.replace("#", "");
  if (hash === "entradas")             { renderEntradas();  showOnly("entradas-view"); }
  else if (hash === "saidas")          { renderSaidas();    showOnly("saidas-view"); }
  else if (hash === "clausulas")       { renderClausulas(); showOnly("clausulas-view"); }
  else if (hash === "balance")         { renderBalance();   showOnly("balance-view"); }
  else if (hash === "updates")         { renderUpdates();  showOnly("updates-view"); }
  else if (hash === "avaliacao")       { renderRating();   showOnly("rating-view"); }
  else if (hash.startsWith("player/")) { renderDetail(hash.replace("player/","")); showOnly("detail-view"); }
  else                                 { renderDashboard(); renderCountdown(); showOnly("dashboard-view"); }
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  const next = isDark ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  document.getElementById("theme-toggle").textContent = next === "dark" ? "☀️" : "🌙";
  localStorage.setItem("theme", next);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById("theme-toggle").textContent =
  document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
document.getElementById("hero-updated").textContent = "Actualizado: " + LAST_UPDATED;
document.getElementById("header-updated").textContent = LAST_UPDATED;
handleRoute();
window.addEventListener("hashchange", handleRoute);
</script>

</body>
</html>
